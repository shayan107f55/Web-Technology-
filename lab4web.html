<!DOCTYPE html>
<html>
<head>
    <title>Lab 4 - CSS Types</title>

    <!-- Internal CSS -->
    <style>
        h2 {
            color: blue;
            text-align: center;
        }

        .internal-para {
            color: darkgreen;
            font-size: 18px;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color:red; text-align:center;">
        Welcome to Lab 4
    </h1>

    <p style="font-size:20px; color:purple;">
        This paragraph is styled using Inline CSS.
    </p>

    <!-- Internal CSS Example -->
    <h2>Internal CSS Example</h2>

    <p class="internal-para">
        This paragraph is styled using Internal CSS.
    </p>

    <!-- External CSS Example -->
    <h3 class="external-heading">External CSS Example</h3>

    <p class="external-para">
        This paragraph is styled using External CSS from style.css file.
    </p>

</body>
</html>
